<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200" role="img" aria-label="Ops Agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111a2e"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <rect width="880" height="200" rx="16" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.6">
    <path d="M0 50 H880 M0 100 H880 M0 150 H880"/>
    <path d="M120 0 V200 M240 0 V200 M360 0 V200 M480 0 V200 M600 0 V200 M720 0 V200"/>
  </g>

  <!-- glyph: terminal + spark -->
  <g transform="translate(48,52)">
    <rect x="0" y="0" width="96" height="96" rx="18" fill="#0f172a" stroke="url(#accent)" stroke-width="2"/>
    <!-- prompt chevron -->
    <path d="M22 36 L40 48 L22 60" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- cursor bar -->
    <rect x="46" y="56" width="28" height="5" rx="2" fill="#a78bfa"/>
    <!-- spark dot -->
    <circle cx="80" cy="20" r="6" fill="#60a5fa"/>
    <circle cx="80" cy="20" r="10" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- title -->
  <text x="176" y="92" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="44" font-weight="700" fill="url(#title)">Ops Agent</text>

  <!-- tagline -->
  <text x="178" y="124" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#94a3b8">面向运维场景的 AI 助手控制台</text>

  <!-- chips -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#cbd5e1">
    <g transform="translate(178,144)">
      <rect width="76" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
      <text x="38" y="17" text-anchor="middle">资产管理</text>
    </g>
    <g transform="translate(262,144)">
      <rect width="76" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
      <text x="38" y="17" text-anchor="middle">终端连接</text>
    </g>
    <g transform="translate(346,144)">
      <rect width="76" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
      <text x="38" y="17" text-anchor="middle">AI 对话</text>
    </g>
    <g transform="translate(430,144)">
      <rect width="92" height="26" rx="13" fill="#1e293b" stroke="#334155"/>
      <text x="46" y="17" text-anchor="middle">命令审批执行</text>
    </g>
  </g>

  <!-- accent bar -->
  <rect x="48" y="172" width="784" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>
</svg>
